<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="canopyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#0099CC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#canopyGradient)" stroke-width="2" opacity="0.3"/>
  <circle cx="60" cy="60" r="52" fill="#0A1628"/>
  
  <!-- Leaf shape -->
  <path d="M60 20 Q75 35 75 55 Q75 70 60 75 Q45 70 45 55 Q45 35 60 20" fill="url(#canopyGradient)" filter="url(#glow)"/>
  <path d="M60 20 Q60 45 60 75" stroke="#00D4FF" stroke-width="1.5" fill="none" opacity="0.6"/>
  
  <!-- Circuit/network roots -->
  <g stroke="url(#canopyGradient)" stroke-width="1.5" fill="none" opacity="0.9">
    <!-- Main stem lines -->
    <path d="M60 75 L60 85"/>
    <path d="M60 85 L45 95"/>
    <path d="M60 85 L75 95"/>
    <path d="M60 85 L60 100"/>
    
    <!-- Branching lines -->
    <path d="M45 95 L35 105"/>
    <path d="M45 95 L50 108"/>
    <path d="M75 95 L85 105"/>
    <path d="M75 95 L70 108"/>
    <path d="M60 100 L55 108"/>
    <path d="M60 100 L65 108"/>
  </g>
  
  <!-- Circuit nodes -->
  <g fill="#00D4FF">
    <circle cx="60" cy="75" r="2"/>
    <circle cx="60" cy="85" r="2.5"/>
    <circle cx="45" cy="95" r="2"/>
    <circle cx="75" cy="95" r="2"/>
    <circle cx="60" cy="100" r="2"/>
    <circle cx="35" cy="105" r="1.5"/>
    <circle cx="50" cy="108" r="1.5"/>
    <circle cx="85" cy="105" r="1.5"/>
    <circle cx="70" cy="108" r="1.5"/>
    <circle cx="55" cy="108" r="1.5"/>
    <circle cx="65" cy="108" r="1.5"/>
  </g>
</svg>