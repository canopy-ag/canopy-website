<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 100" fill="none">
  <defs>
    <linearGradient id="canopyGradFull" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#4ADE80"/>
    </linearGradient>
    <filter id="glowFull" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(10, 10)">
    <circle cx="40" cy="40" r="38" stroke="url(#canopyGradFull)" stroke-width="1" opacity="0.3"/>
    <circle cx="40" cy="40" r="34" fill="#0B1120"/>
    
    <!-- Leaf -->
    <path 
      d="M40 14 C50 21 53 33 50 42 C47 48 40 51 40 51 C40 51 33 48 30 42 C27 33 30 21 40 14Z" 
      fill="url(#canopyGradFull)" 
      filter="url(#glowFull)"
    />
    <path d="M40 18 V51" stroke="#22C55E" stroke-width="0.8" opacity="0.4"/>
    
    <!-- Circuit -->
    <g stroke="#00D4FF" stroke-width="1.2" stroke-linecap="round">
      <path d="M40 51 V58"/>
      <path d="M40 58 L28 66"/>
      <path d="M40 58 L40 68"/>
      <path d="M40 58 L52 66"/>
      <path d="M28 66 L22 74"/>
      <path d="M28 66 L32 72"/>
      <path d="M52 66 L58 74"/>
      <path d="M52 66 L48 72"/>
      <path d="M40 68 L36 74"/>
      <path d="M40 68 L44 74"/>
    </g>
    
    <!-- Nodes -->
    <g fill="#00D4FF">
      <circle cx="40" cy="51" r="2"/>
      <circle cx="40" cy="58" r="1.8"/>
      <circle cx="28" cy="66" r="1.5"/>
      <circle cx="40" cy="68" r="1.5"/>
      <circle cx="52" cy="66" r="1.5"/>
      <circle cx="22" cy="74" r="1.2"/>
      <circle cx="32" cy="72" r="1.2"/>
      <circle cx="36" cy="74" r="1.2"/>
      <circle cx="44" cy="74" r="1.2"/>
      <circle cx="48" cy="72" r="1.2"/>
      <circle cx="58" cy="74" r="1.2"/>
    </g>
  </g>
  
  <!-- CANOPY text -->
  <text 
    x="105" 
    y="62" 
    font-family="Inter, system-ui, sans-serif" 
    font-size="42" 
    font-weight="700" 
    fill="url(#canopyGradFull)"
    letter-spacing="2"
  >CANOPY</text>
</svg>