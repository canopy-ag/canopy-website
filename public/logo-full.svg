<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120">
  <defs>
    <linearGradient id="canopyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF"/>
      <stop offset="100%" style="stop-color:#0099CC"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(10, 10)">
    <circle cx="50" cy="50" r="48" fill="#0A1628" stroke="url(#canopyGradient)" stroke-width="2" opacity="0.3"/>
    <circle cx="50" cy="50" r="44" fill="#0A1628"/>
    
    <!-- Leaf -->
    <path d="M50 15 Q65 30 65 50 Q65 65 50 70 Q35 65 35 50 Q35 30 50 15" fill="url(#canopyGradient)" filter="url(#glow)"/>
    <path d="M50 15 Q50 40 50 70" stroke="#00D4FF" stroke-width="1.5" fill="none" opacity="0.6"/>
    
    <!-- Circuit roots -->
    <g stroke="url(#canopyGradient)" stroke-width="1.5" fill="none" opacity="0.9">
      <path d="M50 70 L50 80"/>
      <path d="M50 80 L35 90"/>
      <path d="M50 80 L65 90"/>
      <path d="M50 80 L50 95"/>
      <path d="M35 90 L25 100"/>
      <path d="M35 90 L40 103"/>
      <path d="M65 90 L75 100"/>
      <path d="M65 90 L60 103"/>
      <path d="M50 95 L45 103"/>
      <path d="M50 95 L55 103"/>
    </g>
    
    <!-- Nodes -->
    <g fill="#00D4FF">
      <circle cx="50" cy="70" r="2"/>
      <circle cx="50" cy="80" r="2.5"/>
      <circle cx="35" cy="90" r="2"/>
      <circle cx="65" cy="90" r="2"/>
      <circle cx="50" cy="95" r="2"/>
      <circle cx="25" cy="100" r="1.5"/>
      <circle cx="40" cy="103" r="1.5"/>
      <circle cx="75" cy="100" r="1.5"/>
      <circle cx="60" cy="103" r="1.5"/>
      <circle cx="45" cy="103" r="1.5"/>
      <circle cx="55" cy="103" r="1.5"/>
    </g>
  </g>
  
  <!-- CANOPY text -->
  <text x="130" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="url(#canopyGradient)" letter-spacing="2">CANOPY</text>
</svg>